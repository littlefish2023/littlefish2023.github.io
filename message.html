<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>留言</title>
        <style>
            body{
                font-family: sans-serif;
            }
            a{
                text-decoration: none;
                color: black;
                font-weight: bolder;
            }
            a:hover{
                text-decoration: underline;
            }
            #top_t{
                background-color: rgb(238, 247, 248);
                width: auto;
                height: auto;
                animation: fadeInDown;
                animation-duration: 1s;
                border-radius: 3px;
            }
            #main{
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                min-width: 1000px;
                z-index: -10;
                zoom: 1;
                background-color: black;
                background-image: url(./img/main.jpg); 
                background-repeat: no-repeat;
                background-size: cover;
                -webkit-background-size: cover;
                -o-background-size: cover;
                background-position: center 0;
            }
            .model{
                width: 95%;
                height: auto;
                background-color: white;
                margin: auto;
                opacity: 90%;
                table-layout: fixed;
                word-break: break-all;
                overflow: hidden;
                margin: 10px;
                border-radius: 10px;
                animation: bounceInRight;
                animation-duration: 1s;
            }
            .biaoyu{
                color: white;
                animation: bounceInLeft;
                animation-duration: 1s;
            }
            .top{
                display: inline-block;
            }
        </style>
    </head>
    <body>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

        <div id="top_t">
            <div class="top"><a href="https://littlefish2023.github.io">主页</a></div>
        </div>

        <div id="main"></div>

        <h1 class="biaoyu">留言版（日后有时间的话可能会精选留言在下方展示）</h1>

        <div class="model">
            <script type='text/javascript' src='https://www.wjx.cn/handler/jqemed.ashx?activity=OHtyX4Q&width=760&source=iframe'></script>
        </div>

        <div class="model">
            <h2>精选留言</h2>
            <p>暂无</p>
        </div>
    </body>

</html>
