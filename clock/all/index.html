<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
        <meta charset="utf-8">
        <link rel="a icon" href="./index_img/p-c.ico">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>b1</title>
        <style>
            body{
                background-color: black;
                overflow: hidden;
            }
            #dateTime{
                color: rgba(0, 0, 0, 0.900);
                font-size: 300%;
                font-family: '微软雅黑';
            }
        </style>
            <style type="text/css">

        
                .imgBox img{
                    width: 100%;
                    margin: 0 auto;
                }
        
                .img1{
                    display: block;
                    animation: fadeInRight;
                    animation-duration: 1s;
                }
        
                .img2{
                    display: none;
                    animation: fadeInRight;
                    animation-duration: 1s;
        
                }
        
                .img3{
                    display: none;
                    animation: fadeInRight;
                    animation-duration: 1s;
        
                }
            </style>
        
    </head>
    <body>
        <script>
            Date.prototype.format = function (fmt) {
                var o = {
                    "y+": this.getFullYear, //年
                    "M+": this.getMonth() + 1, //月份
                    "d+": this.getDate(), //日
                    "h+": this.getHours(), //小时
                    "m+": this.getMinutes(), //分
                    "s+": this.getSeconds() //秒
                };
                if (/(y+)/.test(fmt)) fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
                for (var k in o)
                    if (new RegExp("(" + k + ")").test(fmt)) fmt = fmt.replace(RegExp.$1, (RegExp.$1.length == 1) ? (o[k]) : (("00" + o[k]).substr(("" + o[k]).length)));
                return fmt;
            }
            setInterval("document.getElementById('dateTime').innerHTML = (new Date()).format('yyyy年MM月dd日 hh:mm');", 1000);
        </script>

        <div style="position: relative;width: auto; height: auto;top: 50%;">
            <div class="imgBox">
                <img class="img-slide img1" src="./index_img/1.jpg" alt="1">
                <img class="img-slide img2" src="./index_img/2.jpg" alt="2">
                <img class="img-slide img3" src="./index_img/3.jpg" alt="3">
            </div>
            <div id="dateTime" style="text-align:center;position:absolute; z-index:2; left:50%; top:40%"></div>
        </div>
    </body>

    <script type="text/javascript">
        var index=0;
        //效果
        function ChangeImg() {
            index++;
            var a=document.getElementsByClassName("img-slide");
            if(index>=a.length) index=0;
            for(var i=0;i<a.length;i++){
                a[i].style.display='none';
            }
            a[index].style.display='block';
        }
        //设置定时器，每隔两秒切换一张图片
        setInterval(ChangeImg,27000);
    </script>
    
</html>
