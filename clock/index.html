<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>时钟相框</title>
        <link rel="a icon" href="./index_img/p-c.ico">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
        <style>
            body{
                font-family: sans-serif;
            }
            a{
                text-decoration: none;
                color: rgb(67, 126, 180);
                font-weight: bolder;
            }
            a:hover{
                text-decoration: underline;
            }
            #top_t{
                background-color: rgb(238, 247, 248);
                width: auto;
                height: auto;
                animation: fadeInDown;
                animation-duration: 1s;
                border-radius: 3px;
            }
            #main{
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                min-width: 1000px;
                z-index: -10;
                zoom: 1;
                background-color: black;
                background-image: url(./index_img/main.png); 
                background-repeat: no-repeat;
                background-size: cover;
                -webkit-background-size: cover;
                -o-background-size: cover;
                background-position: center 0;
            }
            .model{
                width: 95%;
                height: auto;
                background-color: white;
                margin: auto;
                opacity: 90%;
                table-layout: fixed;
                word-break: break-all;
                overflow: hidden;
                margin: 10px;
                border-radius: 10px;
                animation: slideInUp;
                animation-duration: 1s;
                text-align: center;
            }
            .biaoyu{
                color: white;
                animation: fadeIn;
                animation-duration: 1s;
                text-align: center;
            }
            .top{
                display: inline-block;
            }
        </style>
    </head>
    <body>
        <div id="top_t">
            <div class="top"><a href="https://littlefish2023.github.io">主页</a></div>
        </div>

        <div id="main"></div>

        <h1 class="biaoyu"><strong>时钟相框</strong></h1>
        <h2 class="biaoyu">实时显示时间，动态播放图片。</h2>
        <h4 class="biaoyu">因Github服务器带宽问题，部分背景图片第一次加载会有点慢。</h4>
        <h4 class="biaoyi">目前仅适配电脑与平板平台。</h4>

        <div class="model">
            <a href="./all/index.html">
                <h2>b1</h2>
                <p>风景版</p>
            </a>
        </div>

        <div class="model">
            <a href="./young/index.html">
                <h2>b2</h2>
                <p>二次元版</p>
            </a>
        </div>
    </body>

</html>
